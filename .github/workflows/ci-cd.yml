name: CI/CD Pipeline – E-Commerce

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  build:
    name: 🔧 Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint com flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  unit-tests:
    name: 🧪 Testes Unitários
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Criar diretório de relatórios
        run: mkdir -p reports
      - name: Executar testes unitários
        run: |
          PYTHONPATH=$PWD pytest -v tests/test_unit.py \
            --tb=short \
            --junitxml=reports/unit-results.xml \
            --cov=ecommerce \
            --cov-report=xml:reports/coverage-unit.xml \
            --cov-report=term-missing \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: reports/unit-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage-report
          path: reports/coverage-unit.xml

  integration-tests:
    name: 🔗 Testes de Integração
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Criar diretório de relatórios
        run: mkdir -p reports
      - name: Executar testes de integração
        run: |
          PYTHONPATH=$PWD pytest -v tests/test_integration.py \
            --tb=short \
            --junitxml=reports/integration-results.xml \
            --cov=ecommerce \
            --cov-report=xml:reports/coverage-integration.xml \
            --cov-report=term-missing \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: reports/integration-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage-report
          path: reports/coverage-integration.xml

  report:
    name: 📊 Relatório Consolidado
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: all-reports
      - name: Exibir sumário no log
        run: |
          echo "=================================="
          echo "  SUMÁRIO CI/CD – E-Commerce"
          echo "=================================="
          find all-reports -type f | sort
      - name: Publicar sumário no GitHub
        run: |
          echo "## 📋 Relatório CI/CD" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Build & Lint | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Testes Unitários | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Testes de Integração | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
